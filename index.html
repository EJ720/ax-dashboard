  document.getElementById('cnt-sched').textContent   = '('+DATA.filter(r=>r.status==='todo'&&n8nProgress(r)+ccProgress(r)===0).length+')';
  const dc = DATA.filter(r=>r.status==='done').length;
  const tg = DATA.filter(r=>r.status!=='operator').length;
  document.getElementById('count-bar').textContent = '완료율 61% ('+dc+'/'+tg+'명) · 검색 결과 '+filtered.length+'명';
  document.getElementById('list').innerHTML = filtered.map(r => {
    const cc  = r.status==='operator'?'c-operator':r.status==='done'?'c-done':'c-todo';
    const bc  = r.status==='operator'?'badge-operator':r.status==='done'?'badge-done':'badge-todo';
    const bt  = r.status==='operator'?'운영자':r.status==='done'?'✅ 완료':'⏳ 미완료';
    if (r.status==='operator') return `<div class="card ${cc}"><div class="card-head"><span class="card-name">${r.name}</span><span class="card-email">${r.email}</span><span class="card-badge ${bc}">${bt}</span></div></div>`;
    const ne = r.exempt.includes('n8n'), ce = r.exempt.includes('CC');
    const nd = N8N.map(t=>{
      if(ne) return `<div class="dot dot-exempt" title="${t}">면제</div>`;
      const ok=!r.missing.includes(t);
      return `<div class="dot ${ok?'dot-done':'dot-missing'}" title="${t}">${t.replace('n8n ','')}</div>`;
    }).join('');
    const cd = CC.map(t=>{
      if(ce) return `<div class="dot dot-exempt" title="${t}">면제</div>`;
      const lb=t==='CC 자유'?'자유':t.replace('CC ','');
      const ok=!r.missing.includes(t);
      return `<div class="dot ${ok?'dot-done':'dot-missing'}" title="${t}">${lb}</div>`;
    }).join('');
    const ns = ne?'면제':(N8N.filter(t=>!r.missing.includes(t)).length+'/6');
    const cs = ce?'면제':(CC.filter(t=>!r.missing.includes(t)).length+'/7');
    return `<div class="card ${cc}"><div class="card-head"><span class="card-name">${r.name}</span><span class="card-email">${r.email}</span><span class="card-badge ${bc}">${bt}</span></div><div class="prog-rows"><div class="prog-row"><span class="prog-label">n8n</span><div class="dots">${nd}</div><span class="prog-summary">${ns}</span></div><div class="prog-row"><span class="prog-label">CC</span><div class="dots">${cd}</div><span class="prog-summary">${cs}</span></div></div></div>`;
  }).join('');
}
render();
</script>
</body>
</html>
